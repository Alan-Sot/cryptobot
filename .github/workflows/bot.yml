name: Run Crypto Bot

on:
  schedule:
    - cron: '50 */5 * * *'
  workflow_dispatch:

concurrency:
  group: cryptobot-singleton
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/crypto
      SPRING_DATASOURCE_USERNAME: ${{ secrets.POSTGRES_USER }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start Postgres
        run: |
          docker run -d --name pg \
            -e POSTGRES_DB=$POSTGRES_DB \
            -e POSTGRES_USER=$POSTGRES_USER \
            -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
            -p 5433:5432 \
            postgres:16

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            docker exec pg pg_isready -U $POSTGRES_USER && break
            sleep 2
          done

      - name: Debug Postgres logs
        if: always()
        run: docker logs pg || true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Run bot
        run: java -jar target/cryptobot-0.0.1-SNAPSHOT.jar